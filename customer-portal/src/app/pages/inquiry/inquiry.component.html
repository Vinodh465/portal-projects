<app-navbar></app-navbar>
<app-sidebar></app-sidebar>
<main class="main-content">
  <div class="page-header d-flex align-items-center" style="gap: 20px;">
    <button class="back-btn" routerLink="/dashboard" style="margin: 0;">
      <i class="bi bi-arrow-left"></i> Back to Dashboard
    </button>
    <h2 class="page-title m-0"><i class="bi bi-search"></i> Sales Inquiries</h2>
    <span class="record-count" style="margin-left: auto;" *ngIf="!loading && data.length > 0">{{ data.length }} Records</span>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading inquiry data from SAP...</p>
  </div>

  <div class="alert-error" *ngIf="error && !loading">
    <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
  </div>

  <div class="table-card" *ngIf="!loading">
    <app-reusable-table 
      [columns]="columns" 
      [data]="data" 
      [enableFilters]="true"
      dateKey="DOC_DATE"
      emptyMessage="No inquiry records found for your account.">
    </app-reusable-table>
  </div>
</main>
