<div class="page fade-in">
  <div class="page-header">
    <h1>Purchase Orders</h1>
    <p>All purchase orders raised against your vendor account</p>
  </div>
  <div class="loading-state" *ngIf="loading">
    <mat-icon class="spin">sync</mat-icon> Loading Purchase Orders...
  </div>
  <div class="error-state" *ngIf="!loading && error">
    <mat-icon>error_outline</mat-icon> {{ error }}
  </div>
  <app-reusable-table
    *ngIf="!loading && !error"
    [data]="data"
    [columns]="columns"
    title="Purchase Order List"
    exportFileName="purchase_orders"
  ></app-reusable-table>
</div>
